<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Energy Gradient Strategy - Own Conceptual Diagram -->
  
  <defs>
    <style>
      .axis-line { stroke: #1a1a1a; stroke-width: 2; fill: none; }
      .grid-line { stroke: #e0e0e0; stroke-width: 1; stroke-dasharray: 4,4; }
      .constant-power { stroke: #ef4444; stroke-width: 3; fill: none; }
      .gradient-power { stroke: #10b981; stroke-width: 3; fill: none; }
      .sweet-spot { fill: #d1fae5; stroke: #059669; stroke-width: 2; stroke-dasharray: 5,3; }
      .problem-zone-low { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; stroke-dasharray: 5,3; }
      .problem-zone-high { fill: #fef3c7; stroke: #d97706; stroke-width: 2; stroke-dasharray: 5,3; }
      .label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #1a1a1a; font-weight: 600; }
      .annotation { font-family: 'Arial', sans-serif; font-size: 12px; fill: #666; }
      .axis-label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #333; }
      .tick-label { font-family: 'Arial', sans-serif; font-size: 11px; fill: #666; }
      .title { font-family: 'Arial', sans-serif; font-size: 18px; font-weight: 700; fill: #1a1a1a; }
      .caption { font-family: 'Arial', sans-serif; font-size: 11px; fill: #666; }
      .legend-box { fill: white; stroke: #999; stroke-width: 1; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Energiegradientenstrategie: Konstante vs. Gradierte Laserleistung</text>
  
  <!-- Axes -->
  <line x1="80" y1="320" x2="720" y2="320" class="axis-line"/>
  <line x1="80" y1="320" x2="80" y2="80" class="axis-line"/>
  
  <!-- Grid lines -->
  <line x1="80" y1="260" x2="720" y2="260" class="grid-line"/>
  <line x1="80" y1="200" x2="720" y2="200" class="grid-line"/>
  <line x1="80" y1="140" x2="720" y2="140" class="grid-line"/>
  
  <line x1="200" y1="320" x2="200" y2="80" class="grid-line"/>
  <line x1="350" y1="320" x2="350" y2="80" class="grid-line"/>
  <line x1="500" y1="320" x2="500" y2="80" class="grid-line"/>
  
  <!-- Y-axis labels -->
  <text x="65" y="325" text-anchor="end" class="tick-label">0</text>
  <text x="65" y="265" text-anchor="end" class="tick-label">100</text>
  <text x="65" y="205" text-anchor="end" class="tick-label">200</text>
  <text x="65" y="145" text-anchor="end" class="tick-label">300</text>
  <text x="65" y="85" text-anchor="end" class="tick-label">400</text>
  
  <text x="30" y="200" text-anchor="middle" class="axis-label" transform="rotate(-90 30 200)">Laserleistung (W)</text>
  
  <!-- X-axis labels -->
  <text x="80" y="340" text-anchor="middle" class="tick-label">0</text>
  <text x="200" y="340" text-anchor="middle" class="tick-label">5</text>
  <text x="350" y="340" text-anchor="middle" class="tick-label">10</text>
  <text x="500" y="340" text-anchor="middle" class="tick-label">15</text>
  <text x="650" y="340" text-anchor="middle" class="tick-label">20</text>
  
  <text x="400" y="365" text-anchor="middle" class="axis-label">Schichtnummer (Übergangsbereich)</text>
  
  <!-- Material zones -->
  <rect x="80" y="355" width="150" height="15" fill="#a8a8a8" stroke="#666"/>
  <text x="155" y="367" text-anchor="middle" class="annotation" font-size="10" fill="white">AISI 415 (Stahl)</text>
  
  <rect x="500" y="355" width="220" height="15" fill="#555" stroke="#333"/>
  <text x="610" y="367" text-anchor="middle" class="annotation" font-size="10" fill="white">Wolfram (W)</text>
  
  <rect x="230" y="355" width="270" height="15" fill="#999" stroke="#666"/>
  <text x="365" y="367" text-anchor="middle" class="annotation" font-size="10">Übergangsbereich</text>
  
  <!-- Sweet spot zone -->
  <rect x="80" y="180" width="640" height="60" class="sweet-spot" opacity="0.3"/>
  <text x="400" y="215" text-anchor="middle" class="annotation" fill="#059669">Sweet-Spot-Bereich</text>
  
  <!-- Problem zones -->
  <rect x="80" y="240" width="640" height="80" class="problem-zone-low" opacity="0.2"/>
  <text x="400" y="285" text-anchor="middle" class="annotation" fill="#dc2626" font-size="11">Zu wenig Energie → Porosität</text>
  
  <rect x="80" y="80" width="640" height="100" class="problem-zone-high" opacity="0.2"/>
  <text x="400" y="125" text-anchor="middle" class="annotation" fill="#d97706" font-size="11">Zu viel Energie → Fe₇W₆, Eigenspannungen</text>
  
  <!-- Constant power line (problematic) -->
  <path d="M 80,180 L 720,180" class="constant-power"/>
  <text x="730" y="185" class="label" fill="#ef4444">Konstant</text>
  
  <!-- Gradient power line (optimal) -->
  <path d="M 80,260 Q 200,260 350,210 T 720,140" class="gradient-power"/>
  <text x="730" y="145" class="label" fill="#10b981">Gradient</text>
  
  <!-- Annotations -->
  <circle cx="350" cy="180" r="8" fill="#ef4444" opacity="0.7"/>
  <text x="365" y="170" class="annotation" fill="#dc2626">Problem:</text>
  <text x="365" y="183" class="annotation" fill="#dc2626">Übermischen</text>
  
  <circle cx="350" cy="210" r="8" fill="#10b981" opacity="0.7"/>
  <text x="365" y="200" class="annotation" fill="#059669">Optimiert:</text>
  <text x="365" y="213" class="annotation" fill="#059669">Sweet-Spot</text>
  
  <!-- Legend -->
  <rect x="520" y="50" width="190" height="65" class="legend-box"/>
  <text x="615" y="68" text-anchor="middle" class="label" font-size="12">Strategie:</text>
  
  <line x1="530" y1="83" x2="570" y2="83" class="constant-power"/>
  <text x="580" y="87" class="annotation">Konstante Leistung</text>
  
  <line x1="530" y1="103" x2="570" y2="103" class="gradient-power"/>
  <text x="580" y="107" class="annotation">Gradierte Leistung</text>
  
  <!-- Caption -->
  <text x="400" y="390" text-anchor="middle" class="caption">Abbildung 3: Energiegradientenstrategie. Konstante Laserleistung (rot) führt im Übergangsbereich</text>
  <text x="400" y="402" text-anchor="middle" class="caption">zu Übermischen und Fe₇W₆-Bildung. Gradierte Leistung (grün) bleibt im Sweet-Spot. Eigene Darstellung.</text>
</svg>
